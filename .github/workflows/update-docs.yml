name: Code Quality Report

# Posts an ESLint + TypeScript report as a PR comment when a pull request
# targeting main touches TypeScript source files.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**/*.ts'
      - 'tests/**/*.ts'
      - 'playwright.config.ts'

jobs:
  report:
    name: Lint & type-check report
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint and capture output
        id: eslint
        run: |
          set +e
          OUTPUT=$(npm run lint -- --format stylish 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          {
            echo 'output<<EOF'
            echo "$OUTPUT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Run TypeScript type-check and capture output
        id: tsc
        run: |
          set +e
          OUTPUT=$(npx tsc --noEmit 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          {
            echo 'output<<EOF'
            echo "$OUTPUT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Post report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const eslintCode = '${{ steps.eslint.outputs.exit_code }}';
            const tscCode    = '${{ steps.tsc.outputs.exit_code }}';
            const eslintOut  = `${{ steps.eslint.outputs.output }}`;
            const tscOut     = `${{ steps.tsc.outputs.output }}`;

            const eslintOk = eslintCode === '0';
            const tscOk    = tscCode    === '0';
            const allOk    = eslintOk && tscOk;

            const eslintBlock = !eslintOk
              ? `<details><summary>ESLint output</summary>\n\n\`\`\`\n${eslintOut}\n\`\`\`\n</details>`
              : '';
            const tscBlock = !tscOk
              ? `<details><summary>TypeScript output</summary>\n\n\`\`\`\n${tscOut}\n\`\`\`\n</details>`
              : '';

            const body = [
              `## Code Quality Report — \`${{ github.sha }}\``,
              '',
              `### ${allOk ? '✅ No issues found — safe to merge' : '❌ Issues found — fix before merging'}`,
              '',
              '| Check | Status |',
              '|---|---|',
              `| ESLint | ${eslintOk ? '✅ Pass' : '❌ Fail'} |`,
              `| TypeScript | ${tscOk  ? '✅ Pass' : '❌ Fail'} |`,
              '',
              eslintBlock,
              tscBlock,
            ].join('\n');

            await github.rest.issues.createComment({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
