name: Code Quality Gate + Copilot Documentation Audit

# Triggers when a PR touching TypeScript source files is opened/updated against main.
#
# Job 1 (code-quality-gate): runs lint + typecheck. Fails the PR if there are violations.
# Job 2 (request-docs-audit): creates a GitHub Issue assigned to @copilot so it audits
#   TSDoc coverage and README completeness, then opens a fix PR if anything is missing.
#   Requires: GitHub Copilot coding agent enabled + repo Actions allowed to create PRs.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**/*.ts'
      - 'tests/**/*.ts'
      - 'playwright.config.ts'
      - '.github/workflows/update-docs.yml'
    types: [opened, synchronize, reopened]

jobs:
  # ── Job 1: Quality gate ────────────────────────────────────────────────────
  # This job is a REQUIRED check. It blocks the PR if lint or types fail.
  code-quality-gate:
    name: Code Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint — no any, no floating promises, no unused vars
        run: npm run lint

      - name: TypeScript — strict type check
        run: npm run typecheck

  # ── Job 2: Documentation audit via Copilot coding agent ───────────────────
  # Runs only after the quality gate passes so Copilot audits clean code.
  # Skip if the actor is a bot to prevent infinite loops.
  request-docs-audit:
    name: Request Copilot Documentation Audit
    runs-on: ubuntu-latest
    needs: code-quality-gate
    if: >
      github.actor != 'github-actions[bot]' &&
      github.actor != 'copilot-swe-agent[bot]' &&
      github.actor != 'dependabot[bot]'

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Create Copilot documentation audit task
        id: create_issue
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const body = [
              '## Your mission — TSDoc & README audit',
              '',
              `Triggered by PR #${pr.number} (branch \`${pr.head.ref}\`) by **${pr.user.login}**.`,
              'The code quality gate passed, so the code is clean.',
              'Now audit documentation across the **entire** project.',
              '',
              '---',
              '',
              '## Prerequisites (do these first)',
              '',
              `1. Clone or check out the repository: \`${repo}\``,
              `2. Check out the **base branch** (\`${pr.base.ref}\`) — audit the merged state, not just the PR branch.`,
              '3. Read every `.ts` file under `src/` before writing anything.',
              '',
              '---',
              '',
              '## Step 1 — TSDoc coverage audit',
              '',
              'For every **public** class, method, getter, and setter in `src/` verify the TSDoc block (`/** */`) includes:',
              '',
              '- A one-sentence description on the first line.',
              '- `@param paramName - Description` for every parameter (skip for zero-param methods).',
              '- `@returns Description` for every non-void method.',
              '- `@throws {ErrorType} Condition` when the member can throw.',
              '',
              'Build a list: `filename → member name → what is missing`.',
              '',
              '---',
              '',
              '## Step 2 — README completeness check',
              '',
              'Open `README.md` and verify:',
              '',
              '- Every class under `src/page-objects/` appears in the **Project structure** table.',
              '- Every variable in `.env.example` is described.',
              '- Every npm script in `package.json` `"scripts"` is documented under **Available commands**.',
              '',
              '---',
              '',
              '## Step 3 — Act on your findings',
              '',
              '### If anything is missing or incomplete:',
              '',
              '1. Create a new branch named `docs/auto-audit-pr-' + pr.number + '` from `' + pr.base.ref + '`.',
              '2. Edit only documentation (TSDoc comments and README). **Do NOT change logic, selectors, or assertions.**',
              '3. Open a pull request:',
              '   - **Base branch:** `' + pr.base.ref + '`',
              '   - **Title:** `docs: add missing TSDoc comments and update README (auto-audit)`',
              '   - **Body:** list every file and method you changed.',
              '4. Post a comment on **this issue** with a link to the new PR and a summary of changes.',
              '',
              '### If everything is already documented:',
              '',
              'Post a comment on this issue with exactly:',
              '> ✅ Nothing to document — all methods are documented and README is up to date.',
              '',
              '**Do not open a PR in that case.**',
            ].join('\n');

            // Try to assign to the Copilot coding agent.
            // Falls back to no assignee if the feature is not enabled on this account.
            let issue;
            try {
              issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `docs: full documentation audit triggered by PR #${pr.number}`,
                body,
                assignees: ['copilot'],
                labels: ['documentation'],
              });
              core.info('Issue created and assigned to @copilot.');
            } catch (err) {
              core.warning(`Could not assign to @copilot (coding agent may not be enabled): ${err.message}`);
              issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `docs: full documentation audit triggered by PR #${pr.number}`,
                body,
                labels: ['documentation'],
              });
              core.info('Issue created without assignee — assign it to @copilot manually when the coding agent is enabled.');
            }

            core.setOutput('issue_url', issue.data.html_url);
            core.setOutput('issue_number', String(issue.data.number));

      - name: Post PR comment with issue link
        if: steps.create_issue.outputs.issue_url != ''
        uses: actions/github-script@v6
        with:
          script: |
            const issueUrl = '${{ steps.create_issue.outputs.issue_url }}';
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '## 🤖 Documentation audit in progress',
                '',
                `A full TSDoc and README audit has been created and assigned to @copilot:`,
                `**${issueUrl}**`,
                '',
                'The agent will:',
                '1. Scan the entire `src/` directory for missing TSDoc.',
                '2. Check `README.md` is complete.',
                '3. If anything is missing, **open a follow-up PR** for you to review and merge.',
                '4. If everything is documented, post a green confirmation on the issue.',
              ].join('\n'),
            });
