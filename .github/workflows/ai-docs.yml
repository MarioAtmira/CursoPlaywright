name: AI Documentation Generator

# Triggered manually from the Actions tab.
# Choose the model to use at dispatch time.
on:
  workflow_dispatch:
    inputs:
      model:
        description: GitHub Models model to use for generation
        required: false
        default: gpt-4o-mini
        type: choice
        options:
          - gpt-4o-mini
          - gpt-4o
          - Phi-4
          - Meta-Llama-3.1-70B-Instruct
          - Mistral-Large-2411

# models:read   — access the GitHub Models inference endpoint via GITHUB_TOKEN
# contents:write — push the generated branch
# pull-requests:write — open the PR
permissions:
  contents: write
  models: read
  pull-requests: write

jobs:
  generate-docs:
    name: Generate AI Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run the documentation generation script.
      # The script reads src/**/*.ts and tests/**/*.ts, calls the model,
      # and writes the result to docs/ai-generated.md.
      - name: Generate documentation
        run: npx tsx .github/scripts/ai-docs.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_MODEL: ${{ inputs.model }}
          DOCS_OUTPUT_FILE: docs/ai-generated.md

      # Create a dedicated branch, commit the generated file, push it, and
      # open a PR for human review. Never pushes directly to main.
      - name: Create branch and open Pull Request
        run: |
          BRANCH="ai-docs/update-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/ai-generated.md

          # Only proceed if the generated file has actually changed.
          if git diff --cached --quiet; then
            echo "No documentation changes detected — skipping PR creation."
            exit 0
          fi

          git commit -m "docs(ai): auto-generate documentation [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "docs(ai): auto-generated documentation update" \
            --body "$(cat <<'BODY'
Automated documentation generated by the [AI Documentation Generator](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.

**Model used:** \`${{ inputs.model }}\`

Review the generated content in \`docs/ai-generated.md\` before merging.

> This PR was created automatically — do **not** merge without reviewing the AI output.
BODY
          )" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
