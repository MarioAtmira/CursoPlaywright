name: Auto-fill PR Description

# Triggers when a PR against main is opened or updated.
# Generates a rich description: categorised file changes, commit list,
# auto-checked type-of-change, and full checklist.
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  fill-description:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Generate PR description via GitHub API
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;

            // ── Fetch changed files and commits ──────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            // ── Categorise files ─────────────────────────────────────────────
            const pageObjectFiles = files.filter(f => f.filename.includes('page-objects/'));
            const testFiles       = files.filter(f => f.filename.startsWith('tests/'));
            const repoFiles       = files.filter(f => f.filename.includes('repository/'));
            const ciFiles         = files.filter(f => f.filename.startsWith('.github/'));
            const configFiles     = files.filter(f =>
              ['package.json','tsconfig.json','playwright.config.ts','eslint.config.mjs'].includes(f.filename)
            );
            const docFiles        = files.filter(f =>
              f.filename === 'README.md' || f.filename.startsWith('docs/')
            );

            const renderSection = (label, list) =>
              list.length === 0 ? '' :
              `**${label}**\n${list.map(f =>
                `- \`${f.filename}\` (+${f.additions} / -${f.deletions}) [${f.status}]`
              ).join('\n')}`;

            const fileSections = [
              renderSection('Page Objects', pageObjectFiles),
              renderSection('Tests', testFiles),
              renderSection('Repository / Selectors', repoFiles),
              renderSection('CI / Workflows', ciFiles),
              renderSection('Config', configFiles),
              renderSection('Documentation', docFiles),
            ].filter(Boolean).join('\n\n');

            // ── Stats ────────────────────────────────────────────────────────
            const totalAdded   = files.reduce((s, f) => s + f.additions, 0);
            const totalDeleted = files.reduce((s, f) => s + f.deletions, 0);

            // ── Commit list ──────────────────────────────────────────────────
            const commitLines = commits
              .map(c => `- ${c.commit.message.split('\n')[0]}`)
              .join('\n');

            // ── Auto-detect type of change ───────────────────────────────────
            const branch       = pr.head.ref;
            const commitBodies = commits.map(c => c.commit.message);
            const hasPrefix    = (prefix) =>
              branch.startsWith(prefix) ||
              commitBodies.some(m => m.toLowerCase().startsWith(prefix));

            const chk = (cond) => cond ? 'x' : ' ';
            const isTest     = hasPrefix('test/') || hasPrefix('feat/');
            const isFix      = hasPrefix('fix:')  || branch.startsWith('fix/');
            const isRefactor = hasPrefix('refactor:') || branch.startsWith('refactor/');
            const isDocs     = hasPrefix('docs:')     || branch.startsWith('docs/');
            const isCI       = hasPrefix('ci:')       || branch.startsWith('ci/');

            // ── Build body ───────────────────────────────────────────────────
            const body = [
              '## Description',
              '',
              `**Branch:** \`${branch}\``,
              `**Files changed:** ${files.length}  (+${totalAdded} additions / -${totalDeleted} deletions)`,
              '',
              fileSections || '_No categorised changes detected._',
              '',
              '### Commits included',
              '',
              commitLines || '_No commits found._',
              '',
              '---',
              '',
              '## Type of change',
              '',
              `- [${chk(isTest)}] New test / Page Object`,
              `- [${chk(isFix)}] Bug fix`,
              `- [${chk(isRefactor)}] Refactor`,
              `- [${chk(isDocs)}] Documentation`,
              `- [${chk(isCI)}] CI / configuration`,
              '',
              '## Checklist',
              '',
              '- [ ] All code and comments are in **English**',
              '- [ ] New methods have a TSDoc block comment (`@param`, `@returns`, `@throws`)',
              '- [ ] No hardcoded selectors — locators go through `elementRepository.ts`',
              '- [ ] No hardcoded credentials — environment variables used and validated in the constructor',
              '- [ ] No `any` types — all variables are explicitly typed',
              '- [ ] Async calls are awaited — no fire-and-forget',
              '- [ ] `npm run lint` passes locally with 0 errors',
              '- [ ] New Page Objects are registered in `README.md`',
              '- [ ] New environment variables are added to `.env.example`',
              '',
              '## ISTQB checklist (if tests were added or modified)',
              '',
              '- [ ] Each test validates a single behaviour',
              '- [ ] Tests run independently — no shared mutable state between tests',
              '- [ ] `test.describe` maps to a functional area; `test.step` maps to a test action',
              '- [ ] No `page.waitForTimeout` — Playwright auto-wait or `expect.poll` used instead',
              '- [ ] Proper teardown in `afterEach` / `afterAll`',
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body,
            });

            core.info(`PR #${pr.number} — description updated (${files.length} files, ${commits.length} commits).`);
